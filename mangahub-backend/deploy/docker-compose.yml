services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo-express:
    image: mongo-express:1
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    depends_on:
      mongo:
        condition: service_healthy

  catalog-svc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.catalog
    environment:
      MONGO_URI: mongodb://mongo:27017
      GRPC_PORT: "50051"
    depends_on:
      mongo:
        condition: service_healthy

  artist-svc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.artist
    environment:
      MONGO_URI: mongodb://mongo:27017
      GRPC_PORT: "50052"
    depends_on:
      mongo:
        condition: service_healthy

  progress-svc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.progress
    environment:
      MONGO_URI: mongodb://mongo:27017
      GRPC_PORT: "50053"
    depends_on:
      mongo:
        condition: service_healthy

  prefs-svc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.prefs
    environment:
      MONGO_URI: mongodb://mongo:27017
      GRPC_PORT: "50054"
    depends_on:
      mongo:
        condition: service_healthy

  tcp-svc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.tcpsync
    ports:
      - "9000:9000"   # raw TCP for clients
      - "9100:9100"   # internal HTTP publish API
    environment:
      TCP_PORT: "9000"
      TCP_HTTP_PORT: "9100"

  udp-svc:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.udpnotify
    ports:
      - "9001:9001/udp"   # UDP for clients
      - "9101:9101"       # internal HTTP publish API
    environment:
      UDP_PORT: "9001"
      UDP_HTTP_PORT: "9101"
      UDP_TTL: "90s"

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: "8080"
      MONGO_URI: mongodb://mongo:27017
      JWT_SECRET: change-me
      CATALOG_GRPC_ADDR: catalog-svc:50051
      ARTIST_GRPC_ADDR: artist-svc:50052
      PROGRESS_GRPC_ADDR: progress-svc:50053
      PREFS_GRPC_ADDR: prefs-svc:50054
      TCP_PUBLISH_URL: http://tcp-svc:9100/publish
      UDP_PUBLISH_URL: http://udp-svc:9101/publish
      MANGADEX_BASE: https://api.mangadex.org
    depends_on:
      mongo:
        condition: service_healthy
      catalog-svc:
        condition: service_started
      artist-svc:
        condition: service_started
      progress-svc:
        condition: service_started
      prefs-svc:
        condition: service_started
      tcp-svc:
        condition: service_started
      udp-svc:
        condition: service_started

volumes:
  mongo_data:
