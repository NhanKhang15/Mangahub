syntax = "proto3";

package mangahub.catalog.v1;

option go_package = "mangahub-backend/proto/catalogpb;catalogpb";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service MangaCatalog {
  rpc GetManga(GetMangaRequest) returns (Manga);
  rpc CreateManga(CreateMangaRequest) returns (Manga);
  rpc UpdateManga(UpdateMangaRequest) returns (Manga);
  rpc DeleteManga(DeleteMangaRequest) returns (google.protobuf.Empty);
  rpc ListManga(ListMangaRequest) returns (ListMangaResponse);
  rpc SearchManga(SearchMangaRequest) returns (ListMangaResponse);
  rpc GetPopularManga(GetPopularMangaRequest) returns (ListMangaResponse);
  rpc GetTrendingManga(GetTrendingMangaRequest) returns (ListMangaResponse);
  rpc ListMangaByArtist(ListMangaByArtistRequest) returns (ListMangaResponse);
  rpc UpsertMangaByExternalIDs(UpsertMangaByExternalIDsRequest) returns (UpsertMangaByExternalIDsResponse);
}

message Manga {
  string id = 1;
  map<string, string> external_ids = 2;
  string title = 3;
  repeated string alt_titles = 4;
  repeated string artist_ids = 5;
  repeated string author_ids = 6;
  string description = 7;
  string status = 8;
  repeated string genres = 9;
  repeated string tags = 10;
  int32 chapters = 11;
  double rating = 12;
  string cover_url = 13;
  int32 popularity = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
}

message GetMangaRequest { string id = 1; }

message CreateMangaRequest { Manga manga = 1; }

message MangaPatch {
  // Optional fields use wrapper-like presence: client sets the *_set flag.
  string title = 1;
  bool title_set = 2;
  repeated string alt_titles = 3;
  bool alt_titles_set = 4;
  repeated string artist_ids = 5;
  bool artist_ids_set = 6;
  repeated string author_ids = 7;
  bool author_ids_set = 8;
  string description = 9;
  bool description_set = 10;
  string status = 11;
  bool status_set = 12;
  repeated string genres = 13;
  bool genres_set = 14;
  repeated string tags = 15;
  bool tags_set = 16;
  int32 chapters = 17;
  bool chapters_set = 18;
  double rating = 19;
  bool rating_set = 20;
  string cover_url = 21;
  bool cover_url_set = 22;
  int32 popularity = 23;
  bool popularity_set = 24;
}

message UpdateMangaRequest {
  string id = 1;
  MangaPatch patch = 2;
}

message DeleteMangaRequest { string id = 1; }

message ListMangaRequest {
  int32 page = 1;
  int32 limit = 2;
  string genre = 3;
  repeated string tags = 4;
  string q = 5;
  string sort = 6;
}

message SearchMangaRequest {
  string query = 1;
  int32 page = 2;
  int32 limit = 3;
}

message ListMangaResponse {
  repeated Manga items = 1;
  int32 page = 2;
  int32 limit = 3;
  int64 total = 4;
}

message GetPopularMangaRequest { int32 limit = 1; }
message GetTrendingMangaRequest { int32 limit = 1; }

message ListMangaByArtistRequest {
  string artist_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message UpsertMangaByExternalIDsRequest { Manga manga = 1; }

message UpsertMangaByExternalIDsResponse {
  Manga manga = 1;
  string action = 2; // "insert" | "update"
}
